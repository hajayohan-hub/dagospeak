<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Fond blanc brillant -->
  <circle cx="50" cy="50" r="46" fill="#ffffff" filter="url(#glow)" />
  <!-- Lettre D brillante en bleu -->
  <text x="50" y="62" font-family="Arial, sans-serif" font-size="48" font-weight="900" fill="#2563eb" text-anchor="middle" filter="url(#glow)">D</text>
  <!-- Bande du drapeau malgache en bas (Blanc et Rouge) -->
  <path d="M 15 78 A 35 35 0 0 0 85 78 L 85 85 A 35 35 0 0 1 15 85 Z" fill="#FC3D28" />
  <path d="M 15 78 A 35 35 0 0 0 50 78 L 50 85 A 35 35 0 0 1 15 85 Z" fill="#FFFFFF" />
</svg>