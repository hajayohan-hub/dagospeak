<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="DagoSpeak - Apprenez le malgache facilement" />
  <meta name="theme-color" content="#2563eb" />

  <title>DagoSpeak</title>

  <!-- Manifest pour PWA -->
  <link rel="manifest" href="/manifest.webmanifest" />

  <!-- Icônes (assure-toi qu'elles existent dans ton dossier assets) -->
  <link rel="icon" type="image/svg+xml" href="/assets/icons/icon-192.svg" />

  <!-- Styles -->
  <link rel="stylesheet" href="/src/ui/styles/tokens.css" />
  <link rel="stylesheet" href="/src/ui/styles/base.css" />
</head>
<body>
  <!-- ✅ SEUL CONTENEUR DE L'APPLICATION -->
  <div id="app"></div>

  <!-- ✅ NAVIGATION MOBILE (Si tu l'utilises, sinon retire ce bloc) -->
  <nav class="ds-mobile-nav" style="position: fixed; bottom: 0; left: 0; right: 0; background: var(--ds-color-surface); border-top: 1px solid var(--ds-color-border); display: flex; justify-content: space-around; padding: 0.5rem 0; z-index: 1000;">
    <a href="#/" data-route="/" style="text-decoration: none; color: var(--ds-color-text-muted); font-size: 1.5rem;">🏠</a>
    <a href="#/themes" data-route="/themes" style="text-decoration: none; color: var(--ds-color-text-muted); font-size: 1.5rem;">📚</a>
    <a href="#/profile" data-route="/profile" style="text-decoration: none; color: var(--ds-color-text-muted); font-size: 1.5rem;">👤</a>
  </nav>

  <!-- ✅ BOUTON DE CHANGEMENT DE THÈME (Optionnel, peut être déplacé dans l'UI) -->
  <button id="theme-toggle" style="position: fixed; top: 1rem; right: 1rem; z-index: 1001; background: var(--ds-color-surface); border: 1px solid var(--ds-color-border); border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 1.2rem;">
    🌓
  </button>

  <!-- ✅ UNIQUE SCRIPT D'INITIALISATION (À la toute fin du body) -->
  <script type="module" src="src/app.js"></script>
</body>
</html>
