<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="DagoSpeak - Apprenez le malgache facilement" />
  <meta name="theme-color" content="#2563eb" />
  <title>DagoSpeak</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/assets/icons/icon-192.svg" />
  <link rel="stylesheet" href="/src/ui/styles/tokens.css" />
  <link rel="stylesheet" href="/src/ui/styles/base.css" />
</head>
<body>
  <!-- ✅ C'EST ICI QUE L'APPLICATION VA SE DESSINER -->
  <div id="app"></div>

  <!-- ✅ NAVIGATION MOBILE (Les 3 icônes que vous voyez) -->
  <nav class="ds-mobile-nav" style="position: fixed; bottom: 0; left: 0; right: 0; background: var(--ds-color-surface); border-top: 1px solid var(--ds-color-border); display: flex; justify-content: space-around; padding: 0.75rem 0; z-index: 1000;">
    <a href="#/" data-route="/" style="text-decoration: none; color: var(--ds-color-text-muted); font-size: 1.5rem; text-align: center;">🏠<br><span style="font-size:0.6rem;">Accueil</span></a>
    <a href="#/themes" data-route="/themes" style="text-decoration: none; color: var(--ds-color-text-muted); font-size: 1.5rem; text-align: center;">📚<br><span style="font-size:0.6rem;">Thèmes</span></a>
    <a href="#/profile" data-route="/profile" style="text-decoration: none; color: var(--ds-color-text-muted); font-size: 1.5rem; text-align: center;">👤<br><span style="font-size:0.6rem;">Profil</span></a>
  </nav>

  <!-- ✅ BOUTON DE CHANGEMENT DE THÈME -->
  <button id="theme-toggle" style="position: fixed; top: 1rem; right: 1rem; z-index: 1001; background: var(--ds-color-surface); border: 1px solid var(--ds-color-border); border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 1.2rem; box-shadow: var(--ds-shadow-sm);">
    🌓
  </button>

  <!-- ✅ UNIQUE SCRIPT D'INITIALISATION (À la toute fin) -->
  <script type="module" src="src/app.js"></script>
</body>
</html>
