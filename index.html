<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="DagoSpeak - Apprenez le français facilement" />
  <meta name="theme-color" content="#2563eb" />
  <title>DagoSpeak</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/assets/dagospeak-logo.svg" />
  <link rel="stylesheet" href="/src/ui/styles/tokens.css" />
  <link rel="stylesheet" href="/src/ui/styles/base.css" />
  <script src="https://cdn.jsdelivr.net/npm/vosk-browser@0.0.8/dist/vosk.js"></script>
</head>
<body>
  <!-- ✅ HEADER AVEC LOGO ET ICÔNES -->
  <header id="main-header" style="position: fixed; top: 0; left: 0; right: 0; background: var(--ds-color-surface); border-bottom: 1px solid var(--ds-color-border); padding: 0.75rem 1rem; z-index: 1000; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--ds-shadow-sm);">
    <div id="header-logo" style="display: flex; align-items: center; gap: 0.5rem; font-weight: bold; font-size: 1.25rem; color: var(--ds-color-primary); cursor: pointer;">
      <img src="/assets/dagospeak-logo.svg" alt="DagoSpeak" style="width: 32px; height: 32px;" />
      <span>DagoSpeak</span>
    </div>
    <div style="display: flex; gap: 0.5rem; align-items: center;">
      <!-- ✅ ICÔNES DANS LE HEADER -->
      <button id="btn-languages" style="background: var(--ds-color-surface-2); border: 1px solid var(--ds-color-border); border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center;" title="Choisir la langue">
        🌐
      </button>
      <button id="btn-about" style="background: var(--ds-color-surface-2); border: 1px solid var(--ds-color-border); border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center;" title="À propos">
        ℹ️
      </button>
      <button id="theme-toggle" style="background: var(--ds-color-surface-2); border: 1px solid var(--ds-color-border); border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center;">
        🌓
      </button>
    </div>
  </header>

  <!-- ✅ CONTENEUR PRINCIPAL -->
  <main id="app" style="padding-top: 70px; padding-bottom: 80px; min-height: 100vh;"></main>

  <!-- ✅ NAVIGATION FOOTER -->
  <nav class="ds-mobile-nav" style="position: fixed; bottom: 0; left: 0; right: 0; background: var(--ds-color-surface); border-top: 1px solid var(--ds-color-border); display: flex; justify-content: space-around; padding: 0.5rem 0; z-index: 1000;">
    <a href="#/" data-route="/" style="text-decoration: none; color: var(--ds-color-text-muted); font-size: 1.4rem; text-align: center; flex: 1; transition: color 0.2s;">
      🏠<br><span style="font-size:0.65rem; font-weight: 600;">Accueil</span>
    </a>
    <a href="#/themes" data-route="/themes" style="text-decoration: none; color: var(--ds-color-text-muted); font-size: 1.4rem; text-align: center; flex: 1; transition: color 0.2s;">
      📚<br><span style="font-size:0.65rem; font-weight: 600;">Thèmes</span>
    </a>
    <a href="#/profile" data-route="/profile" style="text-decoration: none; color: var(--ds-color-text-muted); font-size: 1.4rem; text-align: center; flex: 1; transition: color 0.2s;">
      👤<br><span style="font-size:0.65rem; font-weight: 600;">Profil</span>
    </a>
  </nav>

  <script type="module" src="src/app.js"></script>
</body>
</html>
